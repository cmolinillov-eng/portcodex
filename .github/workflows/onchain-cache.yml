name: Onchain cache + harvests

# 1) Cachea en Supabase lo que no corre en serverless (Kamino con rango y
#    recompensas, fees pendientes de Orca).
# 2) Escanea eventos Collect (harvests) de los V3 y los deja pendientes de
#    confirmar en el panel "En vivo". Cada 30 min + manual.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/onchain-cache.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
      - run: node scripts/onchain-harvests.mjs
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZERION_API_KEY: ${{ secrets.ZERION_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      # Aviso por email de operaciones pendientes (opcional: requiere secrets
      # RESEND_API_KEY y NOTIFY_EMAIL; sin ellos el paso no hace nada).
      - run: node scripts/onchain-notify.mjs
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
